version: '3.7'
services:
  couchdb:
    build:
      context: ./couchdb
      dockerfile: Dockerfile
    ports:
      - "5984:5984"
    volumes:
      - ./couchdb/data:/opt/couchdb/data

  flask:
    build:
      context: ./flask
      dockerfile: Dockerfile
    ports:
      - "5003:5000"
    volumes:
      - ./flask:/app
  
  websockets:
    build:
      context: ./websockets
      dockerfile: Dockerfile.websockets
    ports:
      - "5004:5000"
    volumes:
      - ./websockets:/app_websockets
