<!-- This dialog shows the introduction that comes with an author or text -->
<div id="introductions-dialog-header" class="dialog-header">
  <h2>Introduction on {{ this.introduction_on }}</h2>
  <button id="close-introductions-dialog-button" mat-icon-button [mat-dialog-close]="null">
    <mat-icon>clear</mat-icon>
  </button>
</div>
<div #introductiontext id="introductions-text-body" class="introduction-body" mat-dialog-content tabindex="0">
  <div [innerHTML]="this.content"></div>
</div>
