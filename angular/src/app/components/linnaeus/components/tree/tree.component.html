<mat-tree #tree [dataSource]="dataSource" [treeControl]="treeControl">
  <!-- This is the tree node template for leaf nodes -->
  <mat-tree-node *matTreeNodeDef="let node" matTreeNodePadding>
    <div [style.padding-left.px]="node.level * 16" style="display: flex; align-items: center">
      <button mat-icon-button disabled></button>
      <span (click)="this.request_children.emit(node.linnaeus_id)" class="request-children-link">
        {{ node.name }}
      </span>
      <button
        mat-icon-button
        (click)="this.request_child.emit(node.linnaeus_id)"
        aria-label="Search for {{ node.name }}">
        <mat-icon>arrow_forward</mat-icon>
      </button>
    </div>
  </mat-tree-node>

  <!-- This is the tree node template for expandable nodes -->
  <!-- This is the tree node template for expandable nodes -->
  <mat-tree-node
    *matTreeNodeDef="let node; when: hasChild"
    matTreeNodePadding
    matTreeNodeToggle
    [cdkTreeNodeTypeaheadLabel]="node.name">
    <div [style.padding-left.px]="node.level * 16" style="display: flex; align-items: center">
      <button mat-icon-button matTreeNodeToggle [attr.aria-label]="'Toggle ' + node.name">
        <mat-icon class="mat-icon-rtl-mirror">
          {{ treeControl.isExpanded(node) ? "expand_more" : "chevron_right" }}
        </mat-icon>
      </button>
      <span (click)="this.request_children.emit(node.linnaeus_id)" class="request-children-link">
        {{ node.name }}
      </span>
      <button
        mat-icon-button
        (click)="this.request_child.emit(node.linnaeus_id)"
        aria-label="Search for {{ node.name }}">
        <mat-icon>arrow_forward</mat-icon>
      </button>
    </div>
  </mat-tree-node>
</mat-tree>
